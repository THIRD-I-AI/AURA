# ──────────────────────────────────────────────────────────────────────────
# AURA Microservices — 8 services, shared Dockerfile, separate commands
# ──────────────────────────────────────────────────────────────────────────
# Note: Compose V2 deprecated the top-level `version:` key — schema is now
# auto-detected. Removing the key silences the obsolete-attribute warning
# on every compose invocation.

x-common: &common
  build:
    context: ./aurabackend
    target: base-runtime
  volumes:
    - ./aurabackend:/app
  env_file: .env
  environment:
    - PYTHONPATH=/app
    - AURA_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
  restart: unless-stopped

services:
  # ── Port 8000 — API Gateway ──────────────────────────────────────────
  api_gateway:
    <<: *common
    command: uvicorn api_gateway.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - ORCHESTRATION_SERVICE_URL=http://orchestration_service:8006/v1/orchestrations/query
      - AURA_CODEGEN_URL=http://code_generation_service:8001
      - AURA_CONNECTORS_URL=http://connector_service:8002
      - AURA_SANDBOX_URL=http://execution_sandbox:8003
      - AURA_SCHEDULER_URL=http://scheduler_service:8004
      - AURA_INSIGHTS_URL=http://insights_service:8005
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      connector_service:
        condition: service_healthy

  # ── Port 8001 — Code Generation ──────────────────────────────────────
  code_generation_service:
    <<: *common
    command: uvicorn code_generation_service.main:code_gen_app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Port 8002 — Connectors (+ Vault endpoints) ──────────────────────
  connector_service:
    <<: *common
    command: uvicorn connectors.main:app --host 0.0.0.0 --port 8002 --reload
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Port 8003 — Execution Sandbox ────────────────────────────────────
  execution_sandbox:
    <<: *common
    command: uvicorn execution_sandbox_service.main:execution_app --host 0.0.0.0 --port 8003 --reload
    ports:
      - "8003:8003"
    environment:
      - PYTHONPATH=/app
      - DATABASE_SERVICE_URL=http://connector_service:8002
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      connector_service:
        condition: service_healthy

  # ── Port 8004 — Scheduler ───────────────────────────────────────────
  scheduler_service:
    <<: *common
    command: uvicorn scheduler_service.main:scheduler_app --host 0.0.0.0 --port 8004 --reload
    ports:
      - "8004:8004"
    volumes:
      - ./aurabackend:/app
      - scheduler_data:/app/data
    environment:
      - PYTHONPATH=/app
      - DATABASE_SERVICE_URL=http://connector_service:8002
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      connector_service:
        condition: service_healthy

  # ── Port 8005 — Insights ────────────────────────────────────────────
  insights_service:
    <<: *common
    command: uvicorn insights_service.main:app --host 0.0.0.0 --port 8005 --reload
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Port 8006 — Orchestration ───────────────────────────────────────
  orchestration_service:
    <<: *common
    command: uvicorn orchestration_service.main:app --host 0.0.0.0 --port 8006 --reload
    ports:
      - "8006:8006"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      connector_service:
        condition: service_healthy

  # ── Port 8007 — Metadata Store ──────────────────────────────────────
  metadata_store:
    <<: *common
    command: uvicorn metadata_store.main:metadata_app --host 0.0.0.0 --port 8007 --reload
    ports:
      - "8007:8007"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Port 8009 — UASR (Self-Healing Layer) ────────────────────────────
  uasr_service:
    <<: *common
    build:
      context: ./aurabackend
      target: streaming-runtime
    command: uvicorn uasr.service:app --host 0.0.0.0 --port 8009 --reload
    ports:
      - "8009:8009"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8009/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Port 9092 — Redpanda (Kafka-compatible broker for pipeline streaming) ──
  redpanda:
    image: redpandadata/redpanda:v24.1.8
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
    ports:
      - "9092:9092"
      - "29092:29092"
      - "8082:8082"
      - "9644:9644"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  # ── Port 16686 — Jaeger (OpenTelemetry tracing backend) ───────────────
  jaeger:
    image: jaegertracing/all-in-one:1.56
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  scheduler_data:
    driver: local
  redpanda_data:
    driver: local

networks:
  default:
    name: aura-network
    driver: bridge