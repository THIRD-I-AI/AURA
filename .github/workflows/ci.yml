name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master, "feature/**"]

# Sec-2 #1-#10: CodeQL flagged every job for not declaring permissions
# explicitly. Default GITHUB_TOKEN can be `contents: write` for repos
# created before GitHub's 2023 default tightening, which is more than
# any AURA CI job needs (tests + lint + coverage upload — no deploy,
# no PR comment, no release create). Workflow-level `contents: read`
# forces the principle of least privilege; individual jobs that need
# more can opt up with their own permissions block.
permissions:
  contents: read

jobs:
  # ── Backend tests ────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: aurabackend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: aurabackend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ tests_contract/ \
            --tb=short \
            -q \
            --ignore=tests/test_operability.py \
            -x \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: aurabackend/coverage.xml
  # ── Contract tests ───────────────────────────────────────────────────────
  contract-test:
    name: Contract Tests (Schemathesis)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: aurabackend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: aurabackend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install 'schemathesis>=3.36,<3.40' uvicorn

      - name: Run Schemathesis API Fuzzing
        # We boot the gateway locally. Downstream services aren't running,
        # so we only check 'response_schema_conformance' to ensure the API
        # gracefully handles errors and returns JSON matching the spec.
        run: |
          uvicorn api_gateway.main:app --port 8000 --log-level warning > /tmp/uvicorn.log 2>&1 &
          UVICORN_PID=$!
          # Poll /health instead of a fixed `sleep 5`. The app does heavy import
          # work (LLM providers, OpenTelemetry, langgraph) and a fixed sleep
          # raced the server's startup, intermittently failing with
          # "Connection refused" ~250ms before the app finished starting.
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health >/dev/null 2>&1; then
              echo "gateway ready after ${i}s"; break
            fi
            if ! kill -0 "$UVICORN_PID" 2>/dev/null; then
              echo "uvicorn exited before becoming ready:"; cat /tmp/uvicorn.log; exit 1
            fi
            sleep 1
          done
          schemathesis run http://localhost:8000/openapi.json \
            --checks response_schema_conformance \
            --hypothesis-max-examples=10 \
            --wait-for-schema=30 \
            --experimental=openapi-3.1

  # ── Causal tests ─────────────────────────────────────────────────────────
  causal-test:
    name: Causal Tests (Python 3.12)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: aurabackend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: aurabackend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-causal.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/test_counterfactual_*.py \
            --tb=short \
            -q \
            -x \
            --cov=counterfactual_service \
            --cov-report=term-missing \
            --cov-fail-under=60

  # ── Streaming tests ──────────────────────────────────────────────────────
  streaming-test:
    name: Streaming Tests (Python 3.12)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: aurabackend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: aurabackend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-streaming.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/test_streaming*.py tests/test_uasr*.py tests/test_mapek*.py tests/test_recovery*.py \
            --tb=short \
            -q \
            -x \
            --cov=uasr --cov=pipeline \
            --cov-report=term-missing \
            --cov-fail-under=40

  # ── E2E evaluation gate (8-layer Attest pipeline) ────────────────────────
  # Runs the wide-schema (75-col) chat path through 8 independent assertion
  # layers: schema, latency, per-call token budget, determinism, safety,
  # semantic relevance, per-run cost ceiling, observability. A failure here
  # is a hard ship-blocker — the gate is the contractual SLA from the
  # enterprise upgrade plan.
  eval-gate:
    name: E2E Evaluation Gate (mock)
    runs-on: ubuntu-latest
    needs: backend-test

    defaults:
      run:
        working-directory: aurabackend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: aurabackend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Sprint 12: counterfactual eval gate (Layers 9-11) requires the
          # full causal stack — dowhy for estimator fan-out, econml for the
          # double_ml DR-Learner. Without these the layers silently
          # pytest.skipif() out and the gate becomes false-green. Install
          # the same way the causal_service pod does in prod.
          pip install -r requirements-causal.txt
          pip install pytest pytest-asyncio

      - name: Run 8-layer eval gate (mock LLM)
        env:
          AURA_EVAL_GATE_LATENCY_S: "60"
          AURA_EVAL_GATE_RUN_TOKENS: "32000"
          AURA_EVAL_GATE_COLUMNS: "75"
        run: |
          python -m pytest tests/test_e2e_eval_gate.py -v --tb=short



  # ── E2E evaluation gate — real LLM ───────────────────────────────────────
  # Same 8 layers, but hits Groq/Gemini for real. Tests the production rail
  # end-to-end including provider-reported token capture (Step 2) and the
  # finish_reason="stop" contract (no silent truncation under load).
  #
  # Runs ONLY on push-to-main and on workflow_dispatch — feature branches
  # don't burn API quota. Requires GROQ_API_KEY repo secret. The test
  # itself skips with a clear message when the key is absent.
  eval-gate-real:
    name: E2E Evaluation Gate (real LLM)
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))

    defaults:
      run:
        working-directory: aurabackend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: aurabackend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run 8-layer eval gate (real LLM)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AURA_EVAL_GATE_LATENCY_S: "60"
          AURA_EVAL_GATE_RUN_TOKENS: "32000"
          AURA_EVAL_GATE_COLUMNS: "75"
          AURA_AUDIT_ENABLED: "false"
        run: |
          python -m pytest tests/test_e2e_eval_gate_real.py -v --tb=short

  # ── SDK codegen sync (regenerate + git-diff) ────────────────────────────
  # Sprint 21a: scripts/generate_sdk.py reads aurabackend/openapi.json and
  # emits sdk_clients/aura_gateway_client/{__init__,models,README}. The
  # committed output is byte-stable (generator sorts schemas + enforces
  # required-then-optional field order). This lane regenerates and
  # `git diff --exit-status` fails if the committed code drifts from
  # what regeneration produces — catches forgotten regenerations after
  # openapi.json changes.
  sdk-codegen-sync:
    name: SDK Codegen Sync
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: aurabackend/requirements*.txt

      - name: Install backend dependencies
        # Sprint S21d: the multi-service regen needs every service to
        # import cleanly. That requires the full backend dep stack
        # (FastAPI, sqlalchemy, asyncpg, dowhy, sklearn, …) since each
        # service's main.py wires routers + middleware + lifespan
        # callables at import time. requirements-causal pulls in the
        # sklearn / dowhy chain transitively.
        run: |
          python -m pip install --upgrade pip
          pip install -r aurabackend/requirements.txt
          pip install -r aurabackend/requirements-causal.txt

      - name: Regenerate gateway client (pre-S21d snapshot)
        # Kept as a separate step so the gateway openapi.json snapshot
        # at the repo root stays in sync. S21e can roll this into
        # regen_all_sdks.py.
        run: |
          python scripts/generate_sdk.py \
            --openapi aurabackend/openapi.json \
            --output sdk_clients/aura_gateway_client \
            --package-name aura_gateway_client \
            --service-tag aura-gateway

      - name: Regenerate every microservice client (S21d)
        # Walks every service in scripts/regen_all_sdks.py::SERVICES,
        # dumps fresh OpenAPI to aurabackend/<service>/openapi.json,
        # then regenerates sdk_clients/aura_<service>_client/. Strict
        # mode so any service failing to dump fails CI immediately.
        run: |
          python scripts/regen_all_sdks.py --strict

      - name: Confirm committed clients + schemas match regeneration
        run: |
          # `git diff --exit-code` returns 0 if no diff, 1 if there is a diff.
          # Covers BOTH the generated sdk_clients/ AND the committed
          # service openapi.json snapshots — drift in either fails CI.
          if ! git diff --exit-code sdk_clients/ aurabackend/openapi.json aurabackend/**/openapi.json; then
            echo "::error::sdk_clients/ or a service's openapi.json drifted from regeneration. Run scripts/regen_all_sdks.py locally and commit the result."
            exit 1
          fi

  # ── Scheduler distributed-queue integration (Postgres required) ─────────
  # Sprint 20b: tests/test_scheduler_distributed.py ships Postgres-required
  # tests for LISTEN/NOTIFY round-trip + pg_advisory_lock contention. The
  # base backend-test lane runs Tier A (pure-Python) and silently skips
  # Tier B (Postgres-required). This dedicated lane provisions postgres:16
  # as a service container, exports AURA_PG_TEST_DSN, and re-runs the
  # SAME test file end-to-end so Tier B actually executes.
  #
  # Avoids the silent-skip false-green pattern that bit Sprint 12 / 13.
  scheduler-distributed-test:
    name: Scheduler Distributed (Postgres integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: aura_test_pw
          POSTGRES_DB: aura_scheduler_test
          POSTGRES_USER: aura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: aurabackend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: aurabackend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio asyncpg

      - name: Run scheduler distributed tests against real Postgres
        env:
          # AURA_PG_TEST_DSN unlocks Tier B Postgres-required tests.
          # asyncpg + SQLAlchemy async URL format.
          AURA_PG_TEST_DSN: "postgresql+asyncpg://aura_test:aura_test_pw@localhost:5432/aura_scheduler_test"
        # S20.2: also run test_scheduler_worker_integration.py — its
        # Tier B tests verify the worker's advisory-lock leader
        # election + NOTIFY-wake against the same postgres:16 service
        # container. Both files use the AURA_PG_TEST_DSN env-var gate.
        run: |
          python -m pytest tests/test_scheduler_distributed.py tests/test_scheduler_worker_integration.py -v --tb=short

  # ── Storage S3 integration (MinIO required) ─────────────────────────────
  # Sprint S45: tests/test_storage_s3_duckdb.py is a Tier-B test that
  # proves DuckDB reads CSVs from a real S3-compatible store end-to-end.
  # The base backend-test lane runs Tier A and silently skips Tier B
  # (AURA_S3_TEST_ENDPOINT absent). This dedicated lane starts the
  # official minio/minio image via `docker run` (MinIO's own recommended
  # GitHub Actions pattern — a services: block cannot pass the required
  # `server /data` command), exports the AURA_S3_TEST_* vars, and runs
  # the file so Tier B actually executes.
  #
  # Avoids the silent-skip false-green pattern — same pattern as
  # scheduler-distributed-test (Postgres / Sprint 20b).
  storage-s3:
    name: Storage S3 (MinIO integration)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: aurabackend

    steps:
      - uses: actions/checkout@v6

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=test \
            -e MINIO_ROOT_PASSWORD=test12345 \
            minio/minio server /data

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: aurabackend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then echo "minio up"; exit 0; fi
            sleep 2
          done
          echo "minio did not become ready"; exit 1

      - name: Run S3 integration test
        working-directory: aurabackend
        env:
          AURA_S3_TEST_ENDPOINT: http://localhost:9000
          AURA_S3_TEST_KEY: test
          AURA_S3_TEST_SECRET: test12345
          AURA_S3_TEST_BUCKET: aura-test
        run: python -m pytest tests/test_storage_s3_duckdb.py -v

  # ── Frontend build ───────────────────────────────────────────────────────
  # Runs the REAL production build (tsc -b + vite build), identical to the
  # frontend Dockerfile. A bare `tsc --noEmit` on the solution tsconfig does
  # NOT follow project references, so it silently misses the strict
  # (noUnusedLocals / noEmit-on-error) errors that `tsc -b` and the Docker
  # image enforce — which is how a broken production build slipped past CI.
  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build (tsc -b + vite build)
        run: npm run build

  # ── Frontend tests ───────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run --reporter=verbose

  # ── Frontend render smoke (Playwright) ───────────────────────
  # Real-browser render gate. jsdom does no layout, so the vitest suite
  # reports every element as 0x0 and cannot catch an invisible or clipped
  # panel (e.g. the DAG SVG emitted at a fixed 1280x632 px inside a ~660 px
  # box). Playwright drives a real Chromium against the built app served by
  # `vite preview` (no backend needed for a render smoke).
  frontend-e2e:
    name: Frontend Render Smoke (Playwright)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run render smoke
        run: npx playwright test

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Frontend lint ────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src --max-warnings 0

  # ── Backend security scan ─────────────────────────────────────────────────
  backend-security:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: aurabackend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: |
          bandit -r . \
            -x ./tests,./.venv,./alembic/versions \
            -s B101 \
            -f json -o bandit-report.json || true
          bandit -r . \
            -x ./tests,./.venv,./alembic/versions \
            -s B101 \
            --severity-level high
        # -s B101: skip assert warnings (used in tests/dev)
        # --severity-level high: blocks CI on high-severity findings
        # JSON report (all severities) is non-blocking for review

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: aurabackend/bandit-report.json

  # ── Backend lint ─────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: |
          ruff check aurabackend \
            --ignore E501,E402,F401,E701,E712
        # Ignored rules — planned cleanup tickets:
        #   E501        line length (long prompt strings)
        #   E402        sys.path hacks in tests
        #   F401        re-exports in __init__ files
        #   E701        multiple statements on one line
        #   E712        == True/False comparisons

  # ── Database migrations ──────────────────────────────────────────────────
  db-migrations:
    name: DB Migrations (Alembic)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: aurabackend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: aurabackend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Single migration head
        run: |
          heads="$(python -m alembic heads)"
          echo "$heads"
          n="$(python -m alembic heads | grep -c '(head)')"
          if [ "$n" -ne 1 ]; then
            echo "::error::Expected exactly one Alembic head, found $n (branched history — merge with 'alembic merge')"
            exit 1
          fi

      - name: Upgrade a clean database to head
        env:
          METADATA_DATABASE_URL: sqlite+aiosqlite:///./ci_migrations.db
          SECRET_KEY: ci-not-a-real-secret
          ENVIRONMENT: development
        run: python -m alembic upgrade head

      - name: Downgrade to base (reversibility)
        env:
          METADATA_DATABASE_URL: sqlite+aiosqlite:///./ci_migrations.db
          SECRET_KEY: ci-not-a-real-secret
          ENVIRONMENT: development
        run: python -m alembic downgrade base

      - name: ORM/migration drift check
        env:
          METADATA_DATABASE_URL: sqlite+aiosqlite:///./ci_check.db
          SECRET_KEY: ci-not-a-real-secret
          ENVIRONMENT: development
        run: |
          python -m alembic upgrade head
          # Fails if the ORM models declare columns/tables/indexes that no
          # migration creates (the org_id / recovery-HITL drift class). SQLite
          # server-default comparison is disabled in env.py as unreliable.
          python -m alembic check
