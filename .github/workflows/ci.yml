name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master, "feature/**"]

jobs:
  # ── Backend tests ────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: aurabackend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: aurabackend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --tb=short \
            -q \
            --ignore=tests/test_operability.py \
            -x \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: aurabackend/coverage.xml

  # ── E2E evaluation gate (8-layer Attest pipeline) ────────────────────────
  # Runs the wide-schema (75-col) chat path through 8 independent assertion
  # layers: schema, latency, per-call token budget, determinism, safety,
  # semantic relevance, per-run cost ceiling, observability. A failure here
  # is a hard ship-blocker — the gate is the contractual SLA from the
  # enterprise upgrade plan.
  eval-gate:
    name: E2E Evaluation Gate (mock)
    runs-on: ubuntu-latest
    needs: backend-test

    defaults:
      run:
        working-directory: aurabackend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: aurabackend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run 8-layer eval gate (mock LLM)
        env:
          AURA_EVAL_GATE_LATENCY_S: "60"
          AURA_EVAL_GATE_RUN_TOKENS: "32000"
          AURA_EVAL_GATE_COLUMNS: "75"
        run: |
          python -m pytest tests/test_e2e_eval_gate.py -v --tb=short

  # ── E2E evaluation gate — real LLM ───────────────────────────────────────
  # Same 8 layers, but hits Groq/Gemini for real. Tests the production rail
  # end-to-end including provider-reported token capture (Step 2) and the
  # finish_reason="stop" contract (no silent truncation under load).
  #
  # Runs ONLY on push-to-main and on workflow_dispatch — feature branches
  # don't burn API quota. Requires GROQ_API_KEY repo secret. The test
  # itself skips with a clear message when the key is absent.
  eval-gate-real:
    name: E2E Evaluation Gate (real LLM)
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))

    defaults:
      run:
        working-directory: aurabackend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: aurabackend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run 8-layer eval gate (real LLM)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AURA_EVAL_GATE_LATENCY_S: "60"
          AURA_EVAL_GATE_RUN_TOKENS: "32000"
          AURA_EVAL_GATE_COLUMNS: "75"
          AURA_AUDIT_ENABLED: "false"
        run: |
          python -m pytest tests/test_e2e_eval_gate_real.py -v --tb=short

  # ── Frontend type-check ──────────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ── Frontend tests ───────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run --reporter=verbose

  # ── Frontend lint ────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src --max-warnings 0

  # ── Backend security scan ─────────────────────────────────────────────────
  backend-security:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: aurabackend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: |
          bandit -r . \
            -x ./tests,./.venv,./alembic/versions \
            -s B101 \
            -f json -o bandit-report.json || true
          bandit -r . \
            -x ./tests,./.venv,./alembic/versions \
            -s B101 \
            --severity-level high
        # -s B101: skip assert warnings (used in tests/dev)
        # --severity-level high: blocks CI on high-severity findings
        # JSON report (all severities) is non-blocking for review

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: aurabackend/bandit-report.json

  # ── Backend lint ─────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: |
          ruff check aurabackend \
            --ignore E501,E402,F401,W191,W291,W293,F841,E701,E712,F823
        # Ignored rules — planned cleanup tickets:
        #   E501        line length (long prompt strings)
        #   E402        sys.path hacks in tests
        #   F401        re-exports in __init__ files
        #   W191/W291/W293  tab & trailing-whitespace (316 files; dedicate a
        #               whitespace-only commit to convert tabs→spaces)
        #   F841        unused variables — tracked separately
        #   E701        multiple statements on one line
        #   E712        == True/False comparisons
        #   F823        undefined local (1 occurrence)
