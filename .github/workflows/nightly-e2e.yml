name: Nightly E2E (Docker Compose)

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC every day
  workflow_dispatch:     # Allow manual trigger

permissions:
  contents: read

jobs:
  compose-e2e:
    name: Docker Compose Nightly Integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx

      - name: Seed .env from .env.example
        # docker-compose.yml requires .env (gitignored). For nightly E2E
        # the .env.example dummy values are sufficient — services boot,
        # health endpoints respond, and the E2E suite doesn't hit any
        # external API that needs a real key.
        run: cp .env.example .env

      - name: Boot Docker Compose stack
        run: |
          docker compose up -d --build
          
      - name: Wait for services to be healthy
        # Wait up to 3 minutes for all services to pass their docker healthchecks
        run: |
          timeout 180s bash -c '
            until [ -z "$(docker compose ps -q | xargs docker inspect -f "{{.State.Health.Status}}" | grep -v "healthy")" ]; do
              echo "Waiting for all services to be healthy..."
              sleep 5
            done
            echo "All services are healthy!"
          '

      - name: Run E2E Pytest suite
        working-directory: aurabackend
        run: |
          python -m pytest tests_e2e/ -v --tb=short

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose logs
