name: Nightly E2E (Docker Compose)

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC every day
  workflow_dispatch:     # Allow manual trigger

permissions:
  contents: read

jobs:
  compose-e2e:
    name: Docker Compose Nightly Integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx

      - name: Seed .env from .env.example
        # docker-compose.yml requires .env (gitignored). For nightly E2E
        # the .env.example dummy values are sufficient — services boot,
        # health endpoints respond, and the E2E suite doesn't hit any
        # external API that needs a real key.
        run: cp .env.example .env

      - name: Pre-create writable data directories
        # The compose bind-mount ./aurabackend:/app overlays the
        # Dockerfile's `mkdir /app/data`. Without these dirs on the
        # host, the in-container `aura` user can't create them
        # (different UID than the host runner) and metadata_store /
        # uasr_service crash at startup with "unable to open database
        # file". 777 because the container's runtime UID isn't
        # predictable from the host.
        run: |
          mkdir -p aurabackend/data/uploads aurabackend/data/db
          chmod -R 777 aurabackend/data

      - name: Boot Docker Compose stack
        run: |
          docker compose up -d --build
          
      - name: Wait for services to be healthy
        # Wait up to 3 minutes for all services with a HEALTHCHECK to
        # report healthy. Containers without HEALTHCHECK (e.g. redpanda,
        # jaeger) lack a .State.Health field, which crashed the prior
        # one-liner with "map has no entry for key Health". Use a Go
        # template conditional to skip those containers.
        run: |
          timeout 180s bash -c '
            until [ -z "$(docker compose ps -q | xargs docker inspect -f "{{if .State.Health}}{{.State.Health.Status}}{{end}}" | grep -v "^$" | grep -v "healthy")" ]; do
              echo "Waiting for healthchecked services..."
              docker compose ps -q | xargs docker inspect -f "{{.Name}}: {{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}"
              sleep 5
            done
            echo "All healthchecked services are healthy!"
          '

      - name: Run E2E Pytest suite
        working-directory: aurabackend
        run: |
          python -m pytest tests_e2e/ -v --tb=short

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose logs
