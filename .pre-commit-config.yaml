# Pre-commit hooks for AURA
# Install: pip install pre-commit && pre-commit install
# Run against all files: pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  # Block known LLM / VCS / cloud API keys from ever being committed.
  # Patterns match the literal prefixes used by each provider; the regex is
  # intentionally strict so a variable named `gsk_mode` or `AIzaBaseUrl`
  # does NOT trip the hook — it requires the provider-specific entropy that
  # follows the prefix.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: block-secrets
        name: Block LLM/VCS/cloud API keys
        entry: python scripts/hooks/block_secrets.py
        language: python
        pass_filenames: true
        stages: [pre-commit]
