# Default values for AURA. Override per-environment in your own values.yaml.

# ── Image ──────────────────────────────────────────────────────────────────
# All 9 backend services share the same image, just with different uvicorn
# commands. Frontend is a separate static-served image.
image:
  backend:
    repository: aura/backend
    tag: ""           # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent
  frontend:
    repository: aura/frontend
    tag: ""
    pullPolicy: IfNotPresent
imagePullSecrets: []

# ── Cluster-wide env shared by every backend pod ───────────────────────────
# Override or extend in your values overlay.
env:
  AURA_LOG_FORMAT: json
  AURA_METRICS_ENABLED: "true"
  AURA_AGENT_TIMEOUT: "120"
  PYTHONUNBUFFERED: "1"

# Secret values are read from a Kubernetes Secret you create out-of-band
# (e.g. via sops, sealed-secrets, or an external-secrets operator). The
# chart references it by name; do NOT bake credentials into values.yaml.
envSecretName: aura-secrets

# ── Backend services ───────────────────────────────────────────────────────
# Each entry produces one Deployment + one ClusterIP Service. The container
# command is "uvicorn <module>:<app> --host 0.0.0.0 --port <port> --workers <workers>".
backendServices:
  api_gateway:
    module: api_gateway.main:app
    port: 8000
    workers: 4
    replicas: 2
    resources:
      requests: { cpu: "200m", memory: "512Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }
  code_generation_service:
    module: code_generation_service.main:code_gen_app
    port: 8001
    workers: 2
    replicas: 1
  connector_service:
    module: connectors.main:app
    port: 8002
    workers: 2
    replicas: 1
  execution_sandbox:
    module: execution_sandbox.main:execution_app
    port: 8003
    workers: 2
    replicas: 1
  scheduler_service:
    module: scheduler_service.main:scheduler_app
    port: 8004
    workers: 1
    replicas: 1
  insights_service:
    module: insights.main:app
    port: 8005
    workers: 2
    replicas: 1
  orchestration_service:
    module: orchestration_service.main:app
    port: 8006
    workers: 2
    replicas: 1
  metadata_store:
    module: metadata_store.main:metadata_app
    port: 8007
    workers: 1
    replicas: 1
  uasr_service:
    module: uasr.service:app
    port: 8009
    workers: 1
    replicas: 1
  causal_service:
    # Sprint 7: DoWhy-based root-cause attribution. Heavy deps live in
    # requirements-causal.txt — same image base as counterfactual_service.
    module: causal_service.main:app
    port: 8010
    workers: 1
    replicas: 1
    resources:
      requests: { cpu: "300m", memory: "512Mi" }
      limits:   { cpu: "1.5",  memory: "2Gi" }
  dar_service:
    # Sprint 7: Data-Agnostic Researcher daemon. Spec § DAR — autonomous
    # background insight loop. Pinned to 1 replica because the daemon
    # owns global "next-tick" state in process memory.
    module: dar_service.main:app
    port: 8011
    workers: 1
    replicas: 1
    resources:
      requests: { cpu: "200m", memory: "384Mi" }
      limits:   { cpu: "1",    memory: "1Gi" }
  counterfactual_service:
    # Sprint 8: hash-sealed counterfactual estimation. Pinned to one
    # replica because v1 keeps job state in process memory; Sprint 9
    # introduces a Postgres-backed job table and unlocks horizontal
    # scaling. Larger memory cap accommodates DoWhy PSM/IPW matched
    # datasets — see spec §7 risk #4.
    module: counterfactual_service.main:app
    port: 8012
    workers: 1
    replicas: 1
    resources:
      requests: { cpu: "500m", memory: "512Mi" }
      limits:   { cpu: "2",    memory: "4Gi" }

# Default resources applied to any backend service that doesn't set its own.
defaultBackendResources:
  requests: { cpu: "100m", memory: "256Mi" }
  limits:   { cpu: "500m", memory: "512Mi" }

# ── Frontend ───────────────────────────────────────────────────────────────
frontend:
  enabled: true
  replicas: 2
  port: 80
  resources:
    requests: { cpu: "50m",  memory: "64Mi" }
    limits:   { cpu: "200m", memory: "128Mi" }

# ── Ingress (off by default — enable + tune in your overlay) ───────────────
ingress:
  enabled: false
  className: ""
  host: aura.example.com
  annotations: {}
  tls:
    enabled: false
    secretName: aura-tls

# ── Service account ────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ── Pod security ───────────────────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  # TRAIGA: container root FS is read-only. Writable paths the runtime
  # legitimately needs (/tmp, ~/.cache, audit log, optional /data) are
  # provided as explicit volume mounts in backend-deployments.yaml.
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault

# ── Autoscaling ────────────────────────────────────────────────────────────
# When enabled, a HorizontalPodAutoscaler is rendered for each backend
# service (and optionally the frontend) using the targets below. Per-service
# overrides can be supplied via `backendServices.<name>.autoscaling`.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # Optional — set to a number to also scale on memory.
  targetMemoryUtilizationPercentage: null
  frontend:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ── Pod disruption budgets ─────────────────────────────────────────────────
# A PDB is rendered for any service whose replica count is > 1, keeping at
# least `minAvailable` pods up during voluntary disruptions (node drains,
# rolling upgrades).
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ── Persistence ────────────────────────────────────────────────────────────
# When enabled, a PersistentVolumeClaim is created for the metadata_store
# service and mounted at `mountPath`. Use this only if you're running an
# embedded SQLite/DuckDB inside metadata_store; for production prefer an
# external Postgres referenced via DATABASE_URL in `envSecretName`.
persistence:
  enabled: false
  storageClass: ""        # "" = cluster default
  accessModes: [ReadWriteOnce]
  size: 5Gi
  mountPath: /data
  # Service to mount the volume into. Must be a key in `backendServices`.
  service: metadata_store

# ── Prometheus Operator ServiceMonitors ────────────────────────────────────
# When the Prometheus Operator is installed, enabling this renders one
# ServiceMonitor per backend service that scrapes its `/metrics` endpoint.
# Requires the AURA_METRICS_ENABLED env to be true (already set above) and
# `prometheus-fastapi-instrumentator` initialised in `service_factory.py`.
serviceMonitor:
  enabled: false
  # Selector labels Prometheus uses to discover the ServiceMonitor. Match the
  # `serviceMonitorSelector` on your Prometheus CR (often `release: prometheus`).
  labels: {}
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  # Optional — drop or rewrite labels before ingestion.
  metricRelabelings: []
  relabelings: []

# ── Network policies ───────────────────────────────────────────────────────
# Deny-all ingress baseline + the minimum allow rules AURA needs to work
# inside the cluster. Designed for clusters where a CNI enforces
# NetworkPolicy (Calico, Cilium, etc.).
networkPolicy:
  enabled: false
  # Allow traffic from these namespace selectors into the api_gateway. The
  # default opens it to anything in the same namespace + a sibling
  # `monitoring` ns scraping /metrics.
  ingressNamespaces:
    - matchLabels:
        kubernetes.io/metadata.name: monitoring
  # Permissive egress — leave true for dev only. TRAIGA prod deployments
  # set this to false and supply egressAllowedCIDRs.
  allowAllEgress: true
  # Zero-trust egress allowlist (used when allowAllEgress=false). One
  # entry per external dependency. Use precise CIDRs — never 0.0.0.0/0.
  egressAllowedCIDRs: []
  # Example overlay:
  # egressAllowedCIDRs:
  #   - cidr: 35.247.0.0/16        # Groq / Gemini frontends
  #   - cidr: 10.50.0.0/24         # managed CockroachDB cluster
  #   - cidr: 35.0.0.0/8           # Sentry ingest
  #     except: [35.10.0.0/16]     # carve out anything you don't trust

# ── TRAIGA compliance ──────────────────────────────────────────────────
# Texas Responsible AI Governance Act — see shared/audit_log.py for the
# hash-chained JSONL format the application emits to the audit volume.
traiga:
  # When true, the chart renders a Namespace with PodSecurityAdmission
  # `restricted` enforcement labels. Skip this if you let your platform
  # team own the namespace.
  createNamespace: false

audit:
  enabled: false                   # flip to true in any TRAIGA-scope env
  size: 50Gi
  storageClass: ""                 # WORM-backed StorageClass strongly recommended
  accessModes: [ReadWriteOnce]
  mountPath: /var/log/aura/audit
  # Echoed into the env so shared/audit_log.py picks them up. Leave
  # AURA_AUDIT_ENABLED=true here when audit.enabled is true.
  env:
    AURA_AUDIT_ENABLED: "true"
    AURA_AUDIT_DIR: /var/log/aura/audit
    AURA_AUDIT_MAX_FIELD_BYTES: "16384"

  # TRAIGA WORM shipper — runs alongside every backend pod, streams the
  # hash-chained audit log to S3 Object Lock (bucket-default COMPLIANCE
  # retention). Read-only mount of the audit PVC so a compromised
  # shipper container cannot tamper with the local chain.
  #
  # Bucket must be pre-created with versioning ON and Object Lock
  # enabled in COMPLIANCE mode. The chart does NOT provision the bucket
  # — that's a one-time platform-team operation:
  #
  #   aws s3api create-bucket --bucket aura-audit-prod --region us-east-1 \
  #       --object-lock-enabled-for-bucket
  #   aws s3api put-object-lock-configuration --bucket aura-audit-prod \
  #       --object-lock-configuration '{"ObjectLockEnabled":"Enabled",
  #         "Rule":{"DefaultRetention":{"Mode":"COMPLIANCE","Days":2555}}}'
  s3Shipper:
    enabled: false
    image: amazon/aws-cli:2.15.0
    bucket: ""                     # required when enabled, e.g. aura-audit-prod
    region: us-east-1
    prefix: aura/audit
    intervalSeconds: 60
    # Secret holding AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY (or use
    # IRSA on EKS — set to empty and rely on the serviceAccount IAM role).
    credentialsSecret: ""

  # Continuous chain-integrity verifier. CronJob runs verify_chain over
  # every audit-*.jsonl on the PVC; non-zero exit on any mismatch is
  # surfaced as a Kubernetes Job failure event. Optional webhook posts
  # a summary to Alertmanager / Slack on top.
  verifier:
    enabled: false
    schedule: "*/30 * * * *"        # every 30 minutes
    backoffLimit: 0
    historyLimit: 3
    failedHistoryLimit: 5
    alertWebhook: ""                # e.g. https://hooks.slack.com/services/...
