apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aura.fullname" . }}-env
  labels:
    {{- include "aura.labels" . | nindent 4 }}
data:
{{- range $k, $v := .Values.env }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- if .Values.audit.enabled }}
  # TRAIGA audit overrides (auto-injected when audit.enabled=true).
{{- range $k, $v := .Values.audit.env }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
