{{- if .Values.networkPolicy.enabled -}}
# Default-deny ingress for every AURA pod. Specific allow rules below
# punch holes for the traffic AURA actually needs.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aura.fullname" . }}-deny-all
  labels:
    {{- include "aura.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aura.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
{{- if not .Values.networkPolicy.allowAllEgress }}
    - Egress
{{- end }}
---
# Frontend → api_gateway and same-namespace clients → api_gateway, plus
# any external scrapers (monitoring ns) hitting /metrics.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aura.fullname" . }}-allow-gateway
  labels:
    {{- include "aura.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aura.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api_gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "aura.name" . }}
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/component: frontend
        {{- range .Values.networkPolicy.ingressNamespaces }}
        - namespaceSelector:
            {{- toYaml . | nindent 12 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ (index .Values.backendServices "api_gateway").port }}
---
# api_gateway → all internal backend services on their respective ports.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aura.fullname" . }}-allow-internal
  labels:
    {{- include "aura.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [{{ include "aura.name" . }}]
      - key: app.kubernetes.io/component
        operator: NotIn
        values: [api_gateway, frontend]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "aura.name" . }}
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/component: api_gateway
{{- if .Values.networkPolicy.allowAllEgress }}
---
# Permissive egress — kept for dev clusters only. TRAIGA deployments must
# leave allowAllEgress=false and rely on the zero-trust allowlist below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aura.fullname" . }}-allow-egress
  labels:
    {{- include "aura.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aura.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Egress
  egress:
    - {}
{{- end }}
{{- if not .Values.networkPolicy.allowAllEgress }}
---
# TRAIGA zero-trust egress: deny all by default, then explicitly allow
# only DNS, in-cluster pod-to-pod traffic, and the operator-supplied
# LLM/datastore CIDRs from values.yaml. Anything not on this list is
# blackholed by the CNI — no exfiltration path.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aura.fullname" . }}-zero-trust-egress
  labels:
    {{- include "aura.labels" . | nindent 4 }}
    aura.compliance/traiga: "v1"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aura.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Egress
  egress:
    # 1. Cluster DNS — required for service discovery.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # 2. AURA → AURA in-cluster (so api_gateway can reach the 9 internal services).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "aura.name" . }}
              app.kubernetes.io/instance: {{ .Release.Name }}
    {{- with .Values.networkPolicy.egressAllowedCIDRs }}
    # 3. External allowlist — LLM provider IPs, managed Postgres / Cockroach,
    #    Sentry ingest, etc. Ranges supplied by the operator per environment.
    - to:
        {{- range . }}
        - ipBlock:
            cidr: {{ .cidr }}
            {{- if .except }}
            except:
              {{- range .except }}
              - {{ . }}
              {{- end }}
            {{- end }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
{{- end }}
{{- end }}
{{- /* outer networkPolicy.enabled gate */ -}}
