# ──────────────────────────────────────────────────────────────────────────
# AURA Production Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Requires: .env (copy from aurabackend/.env.prod.example and fill in values)
# ──────────────────────────────────────────────────────────────────────────

x-prod-common: &prod-common
  restart: always
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 512M
      reservations:
        cpus: "0.25"
        memory: 128M
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# Shared env injected onto every stateful backend service (gateway, metadata,
# scheduler, uasr). Extend via <<: *backend-env in each service block.
x-backend-env: &backend-env
  PYTHONPATH: /app
  ENVIRONMENT: production
  DEBUG: "false"
  LOG_LEVEL: warning
  DATABASE_URL: postgresql+asyncpg://${DB_USER:-aura}:${DB_PASSWORD}@db:5432/${DB_NAME:-aura}
  METADATA_DATABASE_URL: postgresql+asyncpg://${DB_USER:-aura}:${DB_PASSWORD}@db:5432/${DB_NAME:-aura}
  SCHEDULER_DATABASE_URL: postgresql+asyncpg://${DB_USER:-aura}:${DB_PASSWORD}@db:5432/${DB_NAME:-aura}
  AURA_JWT_ENABLED: "true"
  AURA_AUTH_MODE: password
  SECRET_KEY: ${SECRET_KEY}
  AURA_UPLOADS_ROOT: /data/uploads
  AURA_SIGNING_PRIVATE_KEY_HEX: ${AURA_SIGNING_PRIVATE_KEY_HEX}
  AURA_PII_TOKEN_KEY: ${AURA_PII_TOKEN_KEY}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  # ── Object storage (S45) — set AURA_STORAGE_BACKEND=s3 + the vars below
  # to make the gateway stateless and scale across multiple nodes. The env
  # values flow in via env_file: .env; listing them here documents intent.
  # For a MinIO overlay, add a `minio` service to a separate compose file:
  #   minio: { image: minio/minio, command: server /data, ... }
  AURA_STORAGE_BACKEND: ${AURA_STORAGE_BACKEND:-local}
  AURA_S3_BUCKET: ${AURA_S3_BUCKET:-}
  AURA_S3_ENDPOINT_URL: ${AURA_S3_ENDPOINT_URL:-}
  AURA_S3_REGION: ${AURA_S3_REGION:-us-east-1}
  AURA_S3_ACCESS_KEY_ID: ${AURA_S3_ACCESS_KEY_ID:-}
  AURA_S3_SECRET_ACCESS_KEY: ${AURA_S3_SECRET_ACCESS_KEY:-}
  AURA_S3_URL_STYLE: ${AURA_S3_URL_STYLE:-path}
  AURA_S3_USE_SSL: ${AURA_S3_USE_SSL:-true}

services:
  # ── Postgres (durable named volume) ──────────────────────────────────
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-aura}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${DB_NAME:-aura}
    volumes:
      - aura-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aura}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Frontend (nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      api_gateway:
        condition: service_healthy
    <<: *prod-common

  # ── Production overrides for backend services ─────────────────────────
  api_gateway:
    <<: *prod-common
    command: uvicorn api_gateway.main:app --host 0.0.0.0 --port 8000 --workers 4
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - aura-uploads:/data/uploads
    environment:
      <<: *backend-env
      ORCHESTRATION_SERVICE_URL: http://orchestration_service:8006/v1/orchestrations/query
      AURA_CODEGEN_URL: http://code_generation_service:8001
      AURA_CONNECTORS_URL: http://connector_service:8002
      AURA_SANDBOX_URL: http://execution_sandbox:8003
      AURA_SCHEDULER_URL: http://scheduler_service:8004
      AURA_INSIGHTS_URL: http://insights_service:8005

  code_generation_service:
    <<: *prod-common
    command: uvicorn code_generation_service.main:code_gen_app --host 0.0.0.0 --port 8001 --workers 2
    volumes: []

  connector_service:
    <<: *prod-common
    command: uvicorn connectors.main:app --host 0.0.0.0 --port 8002 --workers 2
    volumes: []

  execution_sandbox:
    <<: *prod-common
    command: uvicorn execution_sandbox.main:execution_app --host 0.0.0.0 --port 8003 --workers 2
    volumes:
      - scheduler_data:/app/data

  scheduler_service:
    <<: *prod-common
    command: uvicorn scheduler_service.main:scheduler_app --host 0.0.0.0 --port 8004 --workers 1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - scheduler_data:/app/data
    environment:
      <<: *backend-env
      DATABASE_SERVICE_URL: http://connector_service:8002

  insights_service:
    <<: *prod-common
    command: uvicorn insights.main:app --host 0.0.0.0 --port 8005 --workers 2
    volumes: []

  orchestration_service:
    <<: *prod-common
    command: uvicorn orchestration_service.main:app --host 0.0.0.0 --port 8006 --workers 2
    volumes: []

  metadata_store:
    <<: *prod-common
    command: uvicorn metadata_store.main:metadata_app --host 0.0.0.0 --port 8007 --workers 1
    depends_on:
      db:
        condition: service_healthy
    volumes: []
    environment:
      <<: *backend-env

  uasr_service:
    <<: *prod-common
    command: uvicorn uasr.service:app --host 0.0.0.0 --port 8009 --workers 1
    depends_on:
      db:
        condition: service_healthy
    volumes: []
    environment:
      <<: *backend-env

volumes:
  scheduler_data:
  aura-pgdata:
  aura-uploads:
