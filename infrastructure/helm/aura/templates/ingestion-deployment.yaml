apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-ingestion-service
  labels:
    app: aura-ingestion
spec:
  replicas: 5 # High replica count for handling parallel ERP ingestion burst
  selector:
    matchLabels:
      app: aura-ingestion
  template:
    metadata:
      labels:
        app: aura-ingestion
    spec:
      containers:
      - name: ingestion-gateway
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command: ["uvicorn", "ingestion_service.main:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            secretKeyRef:
              name: aura-kafka-secret
              key: bootstrap_servers
        resources:
          requests:
            cpu: "1000m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
