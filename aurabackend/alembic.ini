[alembic]
# Migration environment lives under the aurabackend/ package so the
# same Python env that runs the services also runs migrations.
script_location = alembic
prepend_sys_path = .

# Let env.py resolve the URL from shared.config / env vars so the same
# code works across SQLite (dev), Postgres (prod), etc.
sqlalchemy.url =

# File template for new revisions — year-month-day + slug.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Keep timestamps timezone-aware.
timezone = UTC

[post_write_hooks]
# (none — leave ruff/black off by default to keep autogen output stable)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
